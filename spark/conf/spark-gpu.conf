# spark-gpu.conf — Configuración Spark con RAPIDS Accelerator
# Host: ASUS TUF F15 — RTX 4070 Laptop 8 GB VRAM + i7-12700H / 32 GB RAM
# Uso: spark-submit --properties-file spark/conf/spark-gpu.conf --jars <rapids>,<cudf> <job.py>
# Confirmar versión rapids-4-spark compatible con Spark 3.5.x + CUDA 12.x antes de correr.

# ── Memoria ───────────────────────────────────────────────────────────────────
spark.driver.memory                         8g
spark.executor.memory                       16g
spark.executor.cores                        10
spark.driver.maxResultSize                  4g

# ── Paralelismo ───────────────────────────────────────────────────────────────
spark.sql.shuffle.partitions                20
spark.default.parallelism                   20

# ── RAPIDS plugin ─────────────────────────────────────────────────────────────
spark.plugins                               com.nvidia.spark.SQLPlugin
spark.rapids.memory.pinnedPool.size         2g
spark.rapids.sql.concurrentGpuTasks         2
spark.rapids.sql.enabled                    true

# ── Recursos GPU ──────────────────────────────────────────────────────────────
spark.executor.resource.gpu.amount          1
spark.task.resource.gpu.amount              1

# ── Kafka structured streaming ────────────────────────────────────────────────
spark.sql.streaming.kafka.useDeprecatedOffsetFetching   false

# ── Checkpointing ─────────────────────────────────────────────────────────────
spark.sql.streaming.checkpointLocation      /tmp/spark-checkpoints

# ── UI ────────────────────────────────────────────────────────────────────────
spark.ui.port                               4040
spark.ui.retainedJobs                       50
spark.ui.retainedStages                     50

# ── Serialización ─────────────────────────────────────────────────────────────
spark.serializer                            org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max             512m

# ── Memoria off-heap ──────────────────────────────────────────────────────────
spark.memory.offHeap.enabled                true
spark.memory.offHeap.size                   2g
